name: Release

# Triger on any tag named v.xxx
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: keel-aarch64-apple-darwin
            embed_artifact: libkeel-aarch64-apple-darwin
            rustflags: ""
            bin: keel
            lib: libkeel.dylib

          - os: macos-26-intel
            target: x86_64-apple-darwin
            artifact: keel-x86_64-apple-darwin
            embed_artifact: libkeel-x86_64-apple-darwin
            rustflags: "-C target-cpu=x86-64-v3"
            bin: keel
            lib: libkeel.dylib

          # Two tiers: v3 and baseline v1
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: keel-x86_64-linux-v3
            embed_artifact: libkeel-x86_64-linux-v3
            rustflags: "-C target-cpu=x86-64-v3"
            bin: keel
            lib: libkeel.so

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: keel-x86_64-linux-v1
            embed_artifact: libkeel-x86_64-linux-v1
            rustflags: "-C target-cpu=x86-64"
            bin: keel
            lib: libkeel.so

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: keel-x86_64-windows
            embed_artifact: libkeel-x86_64-windows
            rustflags: "-C target-cpu=x86-64-v3"
            bin: keel.exe
            lib: keel.dll

    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
          target: ${{ matrix.target }}

      - name: Install cargo-pgo
        run: cargo install cargo-pgo

      - name: Build instrumented binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo pgo build -- --target ${{ matrix.target }}

      - name: Build PGO dylib (macOS)
        if: runner.os == 'macOS'
        run: clang -dynamiclib -O2 -o pgo/pgo_dynlib.dylib pgo/pgo_dynlib.c

      - name: Build PGO dylib (Linux)
        if: runner.os == 'Linux'
        run: clang -shared -fPIC -O2 -o pgo/pgo_dynlib.so pgo/pgo_dynlib.c

      - name: Build PGO dylib (Windows)
        if: runner.os == 'Windows'
        run: clang -shared -O2 -o pgo/pgo_dynlib.dll pgo/pgo_dynlib.c

      - name: Gather PGO profiles
        run: |
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-std-library.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/nbody/nbody_lua.kl 10000
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/nbody/nbody_py.kl 10000
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/binary-trees/binary-trees.kl 10
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/fib/fib.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/iter_fib/iter_fib.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-fizzbuzz.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-dynlib.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-import.kl

      - name: Build stdlib dylibs (macOS)
        if: runner.os == 'macOS'
        run: |
          clang -O2 -flto -fomit-frame-pointer -fvisibility=hidden -dynamiclib -o libs/std_src/math/math.dylib libs/std_src/math/math.c
          clang -O2 -flto -fomit-frame-pointer -fvisibility=hidden -dynamiclib -o libs/std_src/time/time.dylib libs/std_src/time/time.c
          clang -O2 -flto -fomit-frame-pointer -fvisibility=hidden -dynamiclib -o libs/std_src/random/random.dylib libs/std_src/random/random.c libs/std_src/random/pcg_basic.c

      - name: Build stdlib dylibs (Linux)
        if: runner.os == 'Linux'
        run: |
          clang -O2 -flto -fomit-frame-pointer -fvisibility=hidden -shared -fPIC -o libs/std_src/math/math.so libs/std_src/math/math.c
          clang -O2 -flto -fomit-frame-pointer -fvisibility=hidden -shared -fPIC -o libs/std_src/time/time.so libs/std_src/time/time.c
          clang -O2 -flto -fomit-frame-pointer -fvisibility=hidden -shared -fPIC -o libs/std_src/random/random.so libs/std_src/random/random.c libs/std_src/random/pcg_basic.c

      - name: Build stdlib dylibs (Windows)
        if: runner.os == 'Windows'
        run: |
          clang -O2 -flto -fuse-ld=lld -fomit-frame-pointer -fvisibility=hidden -shared -o libs/std_src/math/math.dll libs/std_src/math/math.c
          clang -O2 -flto -fuse-ld=lld -fomit-frame-pointer -fvisibility=hidden -shared -o libs/std_src/time/time.dll libs/std_src/time/time.c
          clang -O2 -flto -fuse-ld=lld -fomit-frame-pointer -fvisibility=hidden -shared -o libs/std_src/random/random.dll libs/std_src/random/random.c libs/std_src/random/pcg_basic.c

      - name: Build final binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo pgo optimize -- --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/keel dist/
          cp -R libs dist/
          cp LICENSE THIRD-PARTY-LICENSE dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType "Directory" -Force -Path "dist"
          Copy-Item "target/${{ matrix.target }}/release/keel.exe" "dist/"
          Copy-Item -Path "libs" -Destination "dist/" -Recurse
          Copy-Item "LICENSE" "dist/"
          Copy-Item "THIRD-PARTY-LICENSE" "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Build final binary (LIB)
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo pgo optimize build -- --target ${{ matrix.target }} --profile embed --features embed

      - name: Package (Unix) (LIB)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-lib
          cp target/${{ matrix.target }}/embed/${{ matrix.lib }} dist-lib/
          cp LICENSE THIRD-PARTY-LICENSE dist-lib/
          tar -czf ${{ matrix.embed_artifact }}.tar.gz -C dist-lib .

      - name: Package (Windows) (LIB)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType "Directory" -Force -Path "dist-lib"
          Copy-Item "target/${{ matrix.target }}/embed/${{ matrix.lib }}" "dist-lib/"
          Copy-Item "LICENSE" "dist-lib/"
          Copy-Item "THIRD-PARTY-LICENSE" "dist-lib/"
          Compress-Archive -Path "dist-lib/*" -DestinationPath "${{ matrix.embed_artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            ${{ matrix.embed_artifact }}.tar.gz
            ${{ matrix.embed_artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true

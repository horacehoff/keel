name: Release

# Triger on any tag named v.xxx
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: keel-aarch64-apple-darwin
            rustflags: ""
            bin: keel

          - os: macos-26-intel
            target: x86_64-apple-darwin
            artifact: keel-x86_64-apple-darwin
            rustflags: "-C target-cpu=x86-64-v3"
            bin: keel

          # Two tiers: v3 and baseline v1
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: keel-x86_64-linux-v3
            rustflags: "-C target-cpu=x86-64-v3"
            bin: keel

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: keel-x86_64-linux-v1
            rustflags: "-C target-cpu=x86-64"
            bin: keel

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: keel-x86_64-windows
            rustflags: "-C target-cpu=x86-64-v3"
            bin: keel.exe

    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
          target: ${{ matrix.target }}

      - name: Install cargo-pgo
        run: cargo install cargo-pgo

      - name: Build instrumented binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo pgo build -- --target ${{ matrix.target }}

      - name: Build PGO dylib (macOS)
        if: runner.os == 'macOS'
        run: clang -dynamiclib -O2 -o pgo/pgo_dynlib.dylib pgo/pgo_dynlib.c

      - name: Build PGO dylib (Linux)
        if: runner.os == 'Linux'
        run: clang -shared -fPIC -O2 -o pgo/pgo_dynlib.so pgo/pgo_dynlib.c

      - name: Build PGO dylib (Windows)
        if: runner.os == 'Windows'
        run: clang -shared -O2 -o pgo/pgo_dynlib.dll pgo/pgo_dynlib.c

      - name: Gather PGO profiles
        run: |
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-std-library.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/benchmarks/nbody/nbody_lua.kl 10000
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/benchmarks/nbody/nbody_py.kl 10000
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/benchmarks/binary-trees/binary-trees.kl 10
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/benchmarks/fib/fib.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} examples/benchmarks/iter_fib/iter_fib.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-fizzbuzz.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-dynlib.kl
          target/${{ matrix.target }}/release/${{ matrix.bin }} pgo/pgo-import.kl

      - name: Build final binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo pgo optimize -- --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release keel

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/keel.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
